<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NowearSpin - Gold Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=400;700;900&display=swap');
        :root { 
            --accent: #d4af37; 
            --accent-hover: #aa841c; 
            --accent-gradient: linear-gradient(135deg, #f3e09a 0%, #d4af37 50%, #aa841c 100%);
            --bg: #0d0a05; 
        }
        
        * { -webkit-tap-highlight-color: transparent; user-select: none; }
        
        body { 
            background: var(--bg); color: white; font-family: 'Inter', sans-serif; 
            margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; 
        }

        .header-panel { 
            padding: 12px 16px; background: #0a0804; border-bottom: 1px solid #1c170a; 
            padding-top: calc(12px + var(--tg-safe-area-inset-top, 0px));
        }

        #wheels-container { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; gap: 8px; overflow: hidden; }

        .wheel-track { 
            position: relative; width: 100%; height: 90px; overflow: hidden; 
            border-top: 1px solid rgba(212, 175, 55, 0.2); border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            background: rgba(212, 175, 55, 0.02);
        }

        .pointer { 
            position: absolute; top: 0; left: 50%; transform: translateX(-50%); 
            width: 3px; height: 100%; background: var(--accent); z-index: 50; 
            box-shadow: 0 0 15px var(--accent);
        }

        .wheel-line { display: flex; align-items: center; height: 100%; will-change: transform; }

        .item { 
            min-width: 80px; height: 80px; margin: 0 4px; background: rgba(255, 255, 255, 0.02); 
            border-radius: 12px; display: flex; align-items: center; justify-content: center; 
            border: 1px solid rgba(212, 175, 55, 0.1);
        }
        .item img { width: 55px; height: 55px; object-fit: contain; }

        .btn-main { 
            background: var(--accent-gradient); color: #0d0a05; font-weight: 900; border-radius: 18px; 
            transition: 0.2s; box-shadow: 0 5px 25px rgba(212, 175, 55, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-main:active { transform: scale(0.97); }
        .btn-main:disabled { opacity: 0.3; filter: grayscale(1); }

        .multi-btn { background: #141006; border: 1px solid #28200d; padding: 10px 0; border-radius: 12px; flex: 1; font-weight: 900; font-size: 12px; color: #5a4b2c; }
        .multi-btn.active { border-color: var(--accent); background: #2b220c; color: white; box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }

        #win-modal { display: none; position: fixed; inset: 0; z-index: 999; background: rgba(5, 4, 2, 0.96); backdrop-filter: blur(10px); align-items: center; justify-content: center; }
        .modal-box { background: #120e06; border: 1px solid var(--accent); border-radius: 24px; width: 85%; padding: 25px; text-align: center; box-shadow: 0 0 40px rgba(212, 175, 55, 0.2); }
        
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <header class="header-panel flex justify-between items-center">
        <div class="flex items-center gap-3">
            <a href="index.html" class="flex items-center justify-center w-8 h-8 rounded-full bg-[#1c160a] border border-[#2e2410] active:scale-90 transition-transform">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-[#d4af37]">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </a>
            <div class="font-black italic text-lg tracking-tighter uppercase">Nowear<span class="text-[#d4af37]">Spin</span></div>
        </div>
        
        <div class="flex items-center gap-2 bg-[#1c160a] px-4 py-1.5 rounded-full border border-[#3e3116] shadow-[0_0_10px_rgba(212,175,55,0.05)]">
            <img src="img/star.png" class="w-4 h-4" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1828/1828884.png'">
            <span id="val-stars" class="font-black text-sm text-[#d4af37]">0</span>
        </div>
    </header>

    <div id="wheels-container"></div>

    <div class="p-6 bg-[#0a0804] border-t border-[#1c170a] pb-[calc(24px + var(--tg-safe-area-inset-bottom, 0px))]">
        <div id="multi-wrap" class="flex gap-2 mb-4">
            <button onclick="setMulti(1)" class="multi-btn active" data-m="1">X1</button>
            <button onclick="setMulti(2)" class="multi-btn" data-m="2">X2</button>
            <button onclick="setMulti(3)" class="multi-btn" data-m="3">X3</button>
            <button onclick="setMulti(4)" class="multi-btn" data-m="4">X4</button>
            <button onclick="setMulti(5)" class="multi-btn" data-m="5">X5</button>
        </div>
        <button id="spin-btn" onclick="startSpin()" class="w-full py-4 btn-main uppercase tracking-widest text-sm">Подключение...</button>
    </div>

    <div id="win-modal">
        <div class="modal-box">
            <h2 class="text-xl font-black italic uppercase text-[#d4af37] tracking-wider">Отличный улов!</h2>
            <p class="text-[11px] text-gray-400 uppercase font-medium mt-1">Твои награды:</p>
            
            <div id="win-items-container" class="grid grid-cols-3 gap-2 my-5"></div>
            
            <p class="text-[11px] text-gray-400 uppercase font-bold mb-5">Общая ценность: <span id="total-win-price" class="text-[#d4af37] text-sm">0</span> ★</p>
            
            <button onclick="claimPrize('sell')" id="sell-btn" class="w-full bg-gradient-to-r from-[#f3e09a] via-[#d4af37] to-[#aa841c] text-[#0d0a05] py-4 rounded-xl font-black uppercase text-xs mb-3 shadow-lg shadow-amber-500/10 tracking-wider">Продать и забрать монеты</button>
            <button onclick="claimPrize('keep')" id="keep-btn" class="w-full bg-white/5 text-gray-300 py-4 rounded-xl font-bold uppercase text-[10px] tracking-wider border border-white/5 active:bg-white/10">Оставить в рюкзаке</button>
        </div>
    </div>

<script>
    const SB_URL = "https://ypvvoqbvzfmirprevazq.supabase.co";
    const SB_KEY = "sb_publishable_nG0LGd9T2s1aOM6eTRdoJQ_DPwkMvXz";
    const SB = supabase.createClient(SB_URL, SB_KEY);
    const tg = window.Telegram.WebApp;

    tg.expand();
    tg.enableClosingConfirmation();

    // rarity: 0 - нищий дроп (1, 15, 50), 1 - ценный
const ALL_ITEMS = {
        "star_cheap": { price: 1, img: "star.png", rarity: 0 }, // Исправил ключ
        "star": { price: 5, img: "star.png", rarity: 0 },
        "raketa.png": { price: 50, img: "raketa.png", rarity: 0 },
        "2025.jpg": { price: 500, img: "2025.jpg", rarity: 1 },
        "bear.png": { price: 3500, img: "bear.png", rarity: 1 },
        "car.png": { price: 5000, img: "car.png", rarity: 1 },
        "helmet.png": { price: 25000, img: "helmet.png", rarity: 1 },
        "kepka.png": { price: 100000, img: "kepka.png", rarity: 1 }
    };

    const ALL_KEYS = Object.keys(ALL_ITEMS);
    let user = null, isSpinning = false, multi = 1, currentWins = [];

    async function syncBalance() {
        if (!user) return;
        const { data, error } = await SB.from('users').select('stars').eq('user_id', user.user_id).single();
        if (!error && data) {
            user.stars = data.stars;
            document.getElementById('val-stars').innerText = Math.floor(user.stars);
        }
    }

    async function checkAuth() {
        let userId = tg.initDataUnsafe?.user?.id || 8015661230;
        let { data, error } = await SB.from('users').select('*').eq('user_id', userId).single();
        if (error || !data) {
            const { data: newUser } = await SB.from('users').insert([{ user_id: userId, stars: 0, inventory: [], spin_count: 0 }]).select().single();
            data = newUser;
        }
        user = data;
        document.getElementById('val-stars').innerText = Math.floor(user.stars || 0);
        updateUI();
    }

    function updateUI() {
        if (!user) return;
        const lastFree = user.last_free_spin ? new Date(user.last_free_spin).getTime() : 0;
        const isFree = (Date.now() - lastFree) > 86400000;
        const btn = document.getElementById('spin-btn');
        if (isFree) {
            btn.innerText = "ХАЛЯВНЫЙ СПИН";
            btn.style.background = "#10b981";
        } else {
            const cost = 100 * multi;
            btn.innerText = `ИСПЫТАТЬ УДАЧУ ЗА ${cost} ★`;
            btn.disabled = isSpinning || (user.stars < cost);
        }
        if (!isSpinning) initWheels();
    }

    function initWheels() {
        const container = document.getElementById('wheels-container');
        container.innerHTML = '';
        for(let i=0; i<(multi > 1 ? multi : 1); i++) {
            let content = '';
            for(let j=0; j<140; j++) {
                const k = ALL_KEYS[Math.floor(Math.random()*ALL_KEYS.length)];
                content += `<div class="item"><img src="img/${ALL_ITEMS[k].img}" onerror="this.src='img/star.png'"></div>`;
            }
            container.innerHTML += `<div class="wheel-track"><div class="pointer"></div><div class="wheel-line" id="line-${i}">${content}</div></div>`;
        }
    }

    async function startSpin() {
        await syncBalance();
        if (isSpinning || !user) return;
        
        const lastFree = user.last_free_spin ? new Date(user.last_free_spin).getTime() : 0;
        const isFree = (Date.now() - lastFree) > 86400000;
        const cost = isFree ? 0 : 100 * multi;

        if (!isFree && user.stars < cost) return tg.showAlert("Мало звезд!");

        isSpinning = true;
        document.getElementById('spin-btn').disabled = true;
        currentWins = [];

        const JUNK = ALL_KEYS.filter(k => ALL_ITEMS[k].rarity === 0);
        const RARE = ALL_KEYS.filter(k => ALL_ITEMS[k].rarity === 1);

for(let i=0; i<(isFree ? 1 : multi); i++) {
            let winKey;
            if (isFree) {
                winKey = "star_cheap"; // Теперь ключ совпадает с объектом выше
            } else {
                // ЛОГИКА: 95% Ракета, 5% Редкое за 500
                winKey = (Math.random() < 0.95) ? "raketa.png" : "2025.jpg";
            }
            
            currentWins.push(ALL_ITEMS[winKey]);
            // Важно: если картинка меняется, она должна быть в ALL_ITEMS
            document.getElementById(`line-${i}`).querySelectorAll('img')[130].src = `img/${ALL_ITEMS[winKey].img}`;
        }

        const upd = isFree ? { last_free_spin: new Date().toISOString() } : { stars: user.stars - cost };
        await SB.from('users').update(upd).eq('user_id', user.user_id);
        
        for(let i=0; i<(isFree ? 1 : multi); i++) {
            document.getElementById(`line-${i}`).style.transition = `transform ${7 + (i * 0.4)}s cubic-bezier(0.1, 0, 0, 1)`;
            document.getElementById(`line-${i}`).style.transform = `translateX(-${(130 * 88) - (window.innerWidth / 2) + 44}px)`;
        }
        setTimeout(showModal, 8000);
    }

    function showModal() {
        const container = document.getElementById('win-items-container');
        container.innerHTML = '';
        let total = 0;
        currentWins.forEach(w => {
            total += w.price;
            container.innerHTML += `<div class="bg-white/5 p-2 rounded-xl border border-[#d4af37]/20"><img src="img/${w.img}" class="w-10 h-10 mx-auto"><p class="text-[10px] font-black text-[#d4af37] mt-1">${w.price}★</p></div>`;
        });
        document.getElementById('total-win-price').innerText = total;
        document.getElementById('win-modal').style.display = 'flex';
    }

    async function claimPrize(type) {
        await syncBalance();
        const sum = currentWins.reduce((s, w) => s + w.price, 0);
        if (type === 'sell') await SB.from('users').update({ stars: user.stars + sum }).eq('user_id', user.user_id);
        else {
            const inv = user.inventory || [];
            currentWins.forEach(w => inv.push({...w, id: Date.now() + Math.random()}));
            await SB.from('users').update({ inventory: inv }).eq('user_id', user.user_id);
        }
        location.reload();
    }

    function setMulti(m) { multi = m; document.querySelectorAll('.multi-btn').forEach(b => b.classList.toggle('active', b.dataset.m == m)); updateUI(); }
    window.addEventListener('focus', syncBalance);
    checkAuth();
</script>
</body>
</html>
