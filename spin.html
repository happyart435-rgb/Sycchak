let stars = 0, isBonus = false, bonusSpins = 0;

async function init() {
    try {

            stars = 0; // На случай если базы нет

        }
        document.getElementById('bal').innerText = `Баланс: ${stars} ⭐`;

    } catch(e) { alert("Ошибка подключения к базе"); }

function render() {
    for(let i=0; i<5; i++) {
        let html = '';
        for(let j=0; j<10; j++) {
            let key = Object.keys(ITEMS)[Math.floor(Math.random()*Object.keys(ITEMS).length)];
            html += `<div class="cell"><img src="${ITEMS[key].img}"></div>`;
        }
        document.getElementById('r'+i).innerHTML = html;
    }
}

async function spin() {
    if (stars < 25 && !isBonus) return alert("Мало звезд!");
    
    document.getElementById('spin-btn').disabled = true;
    document.querySelectorAll('.reel').forEach(r => r.style.transform = `translateY(-400px)`);

    setTimeout(async () => {
        // Логика победы тут...
        if (!isBonus) stars -= 25;
        
        let { error } = await SB.from('users').update({ stars }).eq('user_id', userId);
        if (error) alert("Ошибка сохранения в базу!");
        
        document.getElementById('bal').innerText = `Баланс: ${stars} ⭐`;
        document.querySelectorAll('.reel').forEach(r => r.style.transform = `translateY(0)`);

}
