<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Nowear Casino</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        .slot-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; border: 4px solid #d4af37; padding: 5px; width: 350px; height: 300px; overflow: hidden; background: #222; }
        .reel { display: flex; flex-direction: column; transition: transform 1.5s cubic-bezier(0.1, 0, 0, 1); }
        .cell { height: 75px; display: flex; align-items: center; justify-content: center; }
        .cell img { width: 50px; height: 50px; object-fit: contain; }
    </style>
</head>
<body>

<div id="bal">Баланс: загрузка...</div>
<div class="slot-container" id="grid">
    <div class="reel" id="r0"></div><div class="reel" id="r1"></div><div class="reel" id="r2"></div><div class="reel" id="r3"></div><div class="reel" id="r4"></div>
</div>
<button id="spin-btn" onclick="spin()" style="margin-top: 10px;">КРУТИТЬ (25 ⭐)</button>

<script>
const SB = supabase.createClient('https://ypvvoqbvzfmirprevazq.supabase.co', 'sb_publishable_nG0LGd9T2s1aOM6eTRdoJQ_DPwkMvXz');
const userId = '8015661230';

// Твой список (ключи - это имена файлов)
const ITEMS = {
    "star.png": { chance: 100 }, "paska.jpg": { chance: 90 }, "otkritka.jpg": { chance: 85 },
    "koks.jpg": { chance: 80 }, "botinok.png": { chance: 70 }, "kalendar.png": { chance: 70 },
    "1may.jpg": { chance: 60 }, "bear.png": { chance: 50 }, "koktel.png": { chance: 50 },
    "dog.png": { chance: 50 }, "shapka.png": { chance: 50 }, "zmei.png": { chance: 50 },
    "lucky.jpg": { chance: 50 }, "box.png": { chance: 45 }, "krovatka.jpg": { chance: 45 },
    "yayko.png": { chance: 45 }, "meczcc.png": { chance: 45 }, "kryg.PNG": { chance: 45 },
    "gribb.PNG": { chance: 45 }, "booox.png": { chance: 40 }, "mafin.jpg": { chance: 40 },
    "metch.png": { chance: 40 }, "zhele.png": { chance: 40 }, "zirka.PNG": { chance: 35 },
    "cvetk.PNG": { chance: 30 }, "book.jpg": { chance: 25 }, "cvetok.png": { chance: 25 },
    "shar.jpg": { chance: 25 }, "tyfli.PNG": { chance: 20 }, "rozza.png": { chance: 15 },
    "heart.png": { chance: 15 }, "sshapka.PNG": { chance: 12 }, "colso.png": { chance: 10 },
    "soska.jpg": { chance: 8 }, "ciga.png": { chance: 8 }, "ccolso2.png": { chance: 8 },
    "shlem.png": { chance: 6 }, "orel.jpg": { chance: 4 }, "car.png": { chance: 4 },
    "chemodan.jpg": { chance: 4 }, "grob.jpg": { chance: 4 }, "gyba.png": { chance: 4 },
    "kirpitch.jpg": { chance: 2 }, "dyxi.png": { chance: 2 }, "kot.png": { chance: 2 },
    "obyv.jpg": { chance: 2 }, "statyya.jpg": { chance: 1 }, "kepka.png": { chance: 0.5 },
    "costum.jpg": { chance: 0.5 }, "helmet.png": { chance: 0.5 }
};

const itemKeys = Object.keys(ITEMS);
let stars = 0;

async function init() {
    let { data } = await SB.from('users').select('stars').eq('user_id', userId).maybeSingle();
    stars = data?.stars || 0;
    document.getElementById('bal').innerText = `Баланс: ${stars} ⭐`;
    render();
}

function render() {
    for(let i=0; i<5; i++) {
        let html = '';
        for(let j=0; j<10; j++) {
            // Берем случайный ключ из объекта
            let key = itemKeys[Math.floor(Math.random() * itemKeys.length)];
            html += `<div class="cell"><img src="img/${key}"></div>`;
        }
        document.getElementById('r'+i).innerHTML = html;
    }
}

async function spin() {
    if (stars < 25) return alert("Мало звезд!");
    document.getElementById('spin-btn').disabled = true;
    
    // Анимация
    document.querySelectorAll('.reel').forEach(r => r.style.transform = `translateY(-400px)`);

    setTimeout(async () => {
        stars -= 25;
        await SB.from('users').update({ stars }).eq('user_id', userId);
        
        document.getElementById('bal').innerText = `Баланс: ${stars} ⭐`;
        // Сброс анимации
        document.querySelectorAll('.reel').forEach(r => {
            r.style.transition = 'none';
            r.style.transform = `translateY(0)`;
            setTimeout(() => r.style.transition = 'transform 1.5s cubic-bezier(0.1, 0, 0, 1)', 50);
        });
        document.getElementById('spin-btn').disabled = false;
    }, 1500);
}

init();
</script>
</body>
</html>
