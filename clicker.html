<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hamster Clicker</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#111827;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:400px;
    text-align:center;
}

h1{
    margin-bottom:20px;
}

.balance{
    font-size:32px;
    font-weight:bold;
    margin-bottom:20px;
    color:#ffd700;
}

.hamster{
    width:220px;
    height:220px;
    border-radius:50%;
    background:#f59e0b;
    margin:auto;
    cursor:pointer;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:90px;
    user-select:none;
    transition:.1s;
    box-shadow:0 0 30px rgba(255,215,0,.4);
}

.hamster:active{
    transform:scale(.95);
}

.stats{
    margin-top:20px;
    font-size:20px;
}

.upgrades{
    margin-top:25px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}
</style>
</head>
<body>

<div class="container">

    <h1>🐹 Hamster Clicker</h1>

    <div class="balance">
        💰 <span id="coins">0</span>
    </div>

    <div class="hamster" id="hamster">
        🐹
    </div>

    <div class="stats">
        За клик: <span id="perClick">1</span>
    </div>

    <div class="upgrades">
        <button onclick="buyPower()">
            ⚡ Улучшить клик
            (<span id="powerCost">50</span>)
        </button>

        <button onclick="buyAuto()">
            🤖 Автодоход
            (<span id="autoCost">100</span>)
        </button>

        <div style="margin-top:15px;">
            Автодоход: <span id="autoIncome">0</span>/сек
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabase = window.supabase.createClient(
    "https://ypvvoqbvzfmirprevazq.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlwdnZvcWJ2emZtaXJwcmV2YXpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NzM3NTgsImV4cCI6MjA5NzQ0OTc1OH0.bt4iVMEX0JtYzJxW7gtRxWEOz0eXPIOautw7_FALhkc"
);

// Временно фиксированный пользователь
const USER_ID = 123456789;

let coins = 0;
let perClick = 1;
let powerCost = 50;
let autoIncome = 0;
let autoCost = 100;
let energy = 1000;

async function loadPlayer() {

    let { data } = await supabase
        .from("players")
        .select("*")
        .eq("user_id", USER_ID)
        .single();

    if (!data) {

        await supabase
            .from("players")
            .insert({
                user_id: USER_ID,
                points: 0,
                energy: 1000,
                per_click: 1,
                power_cost: 50,
                auto_income: 0,
                auto_cost: 100,
                active_hero_id: 0
            });

        data = {
            points: 0,
            energy: 1000,
            per_click: 1,
            power_cost: 50,
            auto_income: 0,
            auto_cost: 100
        };
    }

    coins = data.points || 0;
    energy = data.energy || 1000;
    perClick = data.per_click || 1;
    powerCost = data.power_cost || 50;
    autoIncome = data.auto_income || 0;
    autoCost = data.auto_cost || 100;

    updateUI();
}

async function savePlayer() {

    const { error } = await supabase
        .from("players")
        .update({
            points: coins,
            energy: energy,
            per_click: perClick,
            power_cost: powerCost,
            auto_income: autoIncome,
            auto_cost: autoCost,
            updated_at: new Date().toISOString()
        })
        .eq("user_id", USER_ID);

    if(error){
        console.error(error);
    }
}

function updateUI(){

    document.getElementById("coins").innerText =
        Math.floor(coins);

    document.getElementById("perClick").innerText =
        perClick;

    document.getElementById("powerCost").innerText =
        powerCost;

    document.getElementById("autoIncome").innerText =
        autoIncome;

    document.getElementById("autoCost").innerText =
        autoCost;
}

document
.getElementById("hamster")
.addEventListener("click", ()=>{

    if(energy <= 0){
        return;
    }

    coins += perClick;
    energy--;

    updateUI();
});

function buyPower(){

    if(coins < powerCost){
        alert("Недостаточно монет!");
        return;
    }

    coins -= powerCost;
    perClick++;

    powerCost =
        Math.floor(powerCost * 1.7);

    updateUI();
}

function buyAuto(){

    if(coins < autoCost){
        alert("Недостаточно монет!");
        return;
    }

    coins -= autoCost;
    autoIncome++;

    autoCost =
        Math.floor(autoCost * 1.8);

    updateUI();
}

setInterval(()=>{

    coins += autoIncome;

    updateUI();

},1000);

setInterval(async ()=>{

    await savePlayer();

},5000);

window.onload = loadPlayer;

</script>

</body>
</html>
