<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Nowear Slots Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #1a0b1a; color: white; margin: 0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        .slot-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; background: #330033; padding: 10px; border: 6px solid #d4af37; border-radius: 15px; width: 95vw; height: 400px; overflow: hidden; }
        .reel { display: flex; flex-direction: column; transition: transform 2s cubic-bezier(0.1, 0, 0, 1); }
        .cell { height: 100px; display: flex; align-items: center; justify-content: center; border: 1px solid #4a004a; }
        .cell img { width: 70px; height: 70px; object-fit: contain; }
        .panel { padding: 20px; text-align: center; }
        button { padding: 15px 40px; background: #d4af37; border: none; border-radius: 50px; font-weight: 900; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div id="ui" class="panel">
    <div id="bal">Баланс: -- ⭐</div>
    <div id="bonus-status"></div>
</div>

<div class="slot-container" id="grid">
    <div class="reel" id="r0"></div><div class="reel" id="r1"></div><div class="reel" id="r2"></div><div class="reel" id="r3"></div><div class="reel" id="r4"></div>
</div>

<div class="panel">
    <button id="spin-btn" onclick="spin()">КРУТИТЬ (25 ⭐)</button>
</div>

<script>
const SB = supabase.createClient('https://ypvvoqbvzfmirprevazq.supabase.co', 'sb_publishable_nG0LGd9T2s1aOM6eTRdoJQ_DPwkMvXz');
const userId = '8015661230';

// Твой список с шансами (чем больше число, тем чаще выпадает)
const ITEMS = {
    "star.png": { name: "Pure Star", chance: 100 },
    "paska.jpg": { name: "Easter Cake", chance: 90 },
    "otkritka.jpg": { name: "Peace Dove", chance: 85 },
    "koks.jpg": { name: "Party Cocktail", chance: 80 },
    "botinok.png": { name: "Old Boot", chance: 70 },
    "kalendar.png": { name: "Event Calendar", chance: 70 },
    "1may.jpg": { name: "1 May Exclusive", chance: 60 },
    "bear.png": { name: "Honey Bear", chance: 50 },
    "koktel.png": { name: "Toxic Mix", chance: 50 },
    "dog.png": { name: "Rich Dog", chance: 50 },
    "shapka.png": { name: "Santa Hat", chance: 50 },
    "zmei.png": { name: "Snake Friend", chance: 50 },
    "lucky.jpg": { name: "Clover Lucky", chance: 50 },
    "box.png": { name: "Jack in Box", chance: 45 },
    "krovatka.jpg": { name: "Baby Bow", chance: 45 },
    "yayko.png": { name: "Dragon Egg", chance: 45 },
    "meczcc.png": { name: "Faith Amulet", chance: 45 },
    "kryg.PNG": { name: "Snow Globe", chance: 45 },
    "gribb.PNG": { name: "Spy Agaric", chance: 45 },
    "booox.png": { name: "Berry Box", chance: 40 },
    "mafin.jpg": { name: "Sugar Muffin", chance: 40 },
    "metch.png": { name: "Star Saber", chance: 40 },
    "zhele.png": { name: "Slime Jelly", chance: 40 },
    "zirka.PNG": { name: "Hanging Star", chance: 35 },
    "cvetk.PNG": { name: "Sakura Flower", chance: 30 },
    "book.jpg": { name: "Ancient Book", chance: 25 },
    "cvetok.png": { name: "Wild Flower", chance: 25 },
    "shar.jpg": { name: "Magic Ball", chance: 25 },
    "tyfli.PNG": { name: "Sky Stilettos", chance: 20 },
    "rozza.png": { name: "Velvet Rose", chance: 15 },
    "heart.png": { name: "Heart Lock", chance: 15 },
    "sshapka.PNG": { name: "Khabib's Papakha", chance: 12 },
    "colso.png": { name: "Blue Diamond", chance: 10 },
    "soska.jpg": { name: "Diamond Pacifier", chance: 8 },
    "ciga.png": { name: "Luxury Cigar", chance: 8 },
    "ccolso2.png": { name: "Star Ring", chance: 8 },
    "shlem.png": { name: "Biker Helmet", chance: 6 },
    "orel.jpg": { name: "Golden Eagle", chance: 4 },
    "car.png": { name: "Sports Car", chance: 4 },
    "chemodan.jpg": { name: "Traveler Case", chance: 4 },
    "grob.jpg": { name: "Ancient Coffin", chance: 4 },
    "gyba.png": { name: "Lava Lips", chance: 4 },
    "kirpitch.jpg": { name: "Golden Brick", chance: 2 },
    "dyxi.png": { name: "Gold Perfume", chance: 2 },
    "kot.png": { name: "Atomic Cat", chance: 2 },
    "obyv.jpg": { name: "Sneakers Pro", chance: 2 },
    "statyya.jpg": { name: "Hero Statue", chance: 1 },
    "kepka.png": { name: "Legendary Cap", chance: 0.5 },
    "costum.jpg": { name: "Royal Costume", chance: 0.5 },
    "helmet.png": { name: "Spartan Helmet", chance: 0.5 }
};

let stars = 0, isBonus = false, bonusSpins = 0;

async function init() {
    let { data } = await SB.from('users').select('stars').eq('user_id', userId).single();
    stars = data.stars;
    document.getElementById('bal').innerText = `Баланс: ${stars} ⭐`;
    render();
}

function render() {
    for(let i=0; i<5; i++) {
        let html = '';
        for(let j=0; j<20; j++) html += `<div class="cell"><img src="img/${getRandomItem()}"></div>`;
        document.getElementById('r'+i).innerHTML = html;
    }
}

function getRandomItem(rare = false) {
    let list = Object.keys(ITEMS).filter(k => rare ? ITEMS[k].chance < 10 : true);
    let total = list.reduce((s, k) => s + ITEMS[k].chance, 0);
    let r = Math.random() * total;
    for (let k of list) {
        r -= ITEMS[k].chance;
        if (r <= 0) return k;
    }
}

async function spin() {
    if (!isBonus && stars < 25) return alert("Мало звезд!");
    document.getElementById('spin-btn').disabled = true;

    // Анимация
    document.querySelectorAll('.reel').forEach(r => r.style.transform = `translateY(-1500px)`);

    setTimeout(async () => {
        let grid = [];
        for(let i=0; i<5; i++) {
            let col = [];
            for(let j=0; j<4; j++) col.push(getRandomItem(isBonus));
            grid.push(col);
        }

        // Логика бонуски: 5+ звезд на всем поле = активируем
        let starCount = grid.flat().filter(s => s === 'star.png').length;
        if (starCount >= 5 && !isBonus) {
            isBonus = true; bonusSpins = 10;
            alert("🔥 БОНУСКА! 10 ФРИСПИНОВ!");
        }

        if (!isBonus) stars -= 25;
        await SB.from('users').update({ stars }).eq('user_id', userId);
        
        if (isBonus) {
            bonusSpins--;
            document.getElementById('bonus-status').innerText = `ФРИСПИНОВ: ${bonusSpins}`;
            if (bonusSpins <= 0) isBonus = false;
        }

        document.getElementById('bal').innerText = `Баланс: ${stars} ⭐`;
        document.querySelectorAll('.reel').forEach(r => r.style.transform = `translateY(0)`);
        document.getElementById('spin-btn').disabled = false;
    }, 2000);
}

init();
</script>
</body>
</html>
