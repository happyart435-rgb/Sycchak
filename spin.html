function updateReels() {
    document.querySelectorAll('.slot-reel').forEach(reel => {
        let html = '';
        for(let i=0; i<15; i++) { // Увеличил количество элементов для плавности

            html += `<div class="cell"><img src="img/${randomKey}"></div>`;

    });

async function spin() {
    const bet = parseInt(document.getElementById('bet-input')?.value) || 25;
    const btn = document.getElementById('spin-btn');
    
    // Проверка баланса
    const { data: u } = await SB.from('users').select('stars').eq('user_id', userId).single();
    if (!u || u.stars < bet) return alert("Недостаточно звезд!");

    btn.disabled = true;
    updateReels(); // Генерируем новые картинки
    
    // Запускаем анимацию
    document.querySelectorAll('.slot-reel').forEach(r => {
        r.style.transition = 'transform 2s cubic-bezier(0.1, 0, 0, 1)';
        r.style.transform = `translateY(-800px)`; 
    });
    
    setTimeout(async () => {
        let win = Math.random() > 0.7 ? bet * 3 : 0;
        
        if (win > 0) {
            document.getElementById('win-amount').innerText = win;
            document.getElementById('win-display').style.display = 'block';
            setTimeout(() => document.getElementById('win-display').style.display = 'none', 3000);
        }
        
        // Синхронизация с БД
        await SB.from('users').update({ stars: u.stars - bet + win }).eq('user_id', userId);
        document.getElementById('balance').innerText = `${u.stars - bet + win} ⭐`;
        
        // Сброс анимации без транзишена, чтобы мгновенно вернуть в начало
        document.querySelectorAll('.slot-reel').forEach(r => {
            r.style.transition = 'none';
            r.style.transform = `translateY(0)`;
        });

    }, 2000);
}
