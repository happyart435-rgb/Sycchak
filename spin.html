<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NowearSlots</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .slot { width: 80px; height: 80px; background: #1a140a; border: 2px solid #d4af37; border-radius: 16px; display: flex; align-items: center; justify-content: center; }
        .slot img { width: 60px; height: 60px; object-fit: contain; }
    </style>
</head>
<body class="bg-[#0d0a05] text-white flex flex-col items-center min-h-screen pt-10">

    <div class="mb-8 text-center">
        <h2 class="text-[#d4af37] font-black text-2xl uppercase italic">СЛОТЫ</h2>
        <p id="balance" class="text-white font-bold">Баланс: 0 ⭐</p>
    </div>

    <div class="flex gap-4 mb-8">
        <div id="s1" class="slot"><img src="img/star.png"></div>
        <div id="s2" class="slot"><img src="img/star.png"></div>
        <div id="s3" class="slot"><img src="img/star.png"></div>
    </div>

    <button id="btn-spin" onclick="startSpin()" class="bg-[#d4af37] text-black font-black px-10 py-4 rounded-2xl uppercase hover:scale-105 transition">
        КРУТИТЬ (50 ⭐)
    </button>

<script>
const tg = window.Telegram.WebApp;
const userId = String(tg.initDataUnsafe?.user?.id || '8015661230');
const SB = supabase.createClient('https://ypvvoqbvzfmirprevazq.supabase.co', 'sb_publishable_nG0LGd9T2s1aOM6eTRdoJQ_DPwkMvXz');

const ITEMS = {
    "star.png": { name: "Pure Star", price: 5 },
    "bear.png": { name: "Honey Bear", price: 3500 },
    "car.png": { name: "Sports Car", price: 5000 },
    "cvetok.png": { name: "Wild Flower", price: 1000 },
    "kepka.png": { name: "Legendary Cap", price: 100000 }
};
const keys = Object.keys(ITEMS);

let user = null;

async function init() {
    const { data } = await SB.from('users').select('*').eq('user_id', userId).maybeSingle();
    user = data;
    document.getElementById('balance').innerText = `Баланс: ${user.stars || 0} ⭐`;
}

async function startSpin() {
    if (user.stars < 50) return tg.showAlert("Недостаточно звезд!");
    
    // 1. Списание
    const { error } = await SB.from('users').update({ stars: user.stars - 50 }).eq('user_id', userId);
    if (error) return;

    // 2. Генерация результатов
    const r1 = keys[Math.floor(Math.random() * keys.length)];
    const r2 = keys[Math.floor(Math.random() * keys.length)];
    const r3 = keys[Math.floor(Math.random() * keys.length)];

    document.getElementById('s1').innerHTML = `<img src="img/${r1}">`;
    document.getElementById('s2').innerHTML = `<img src="img/${r2}">`;
    document.getElementById('s3').innerHTML = `<img src="img/${r3}">`;

    // 3. Проверка комбо
    if (r1 === r2 && r2 === r3) {
        const rewardName = ITEMS[r1].name;
        const prize = ITEMS[r1].price; // Или множитель от этого значения
        
        const newInv = [...(user.inventory || []), { img: 'img/' + r1, id: Date.now() }];
        await SB.from('users').update({ 
            stars: user.stars - 50 + prize,
            inventory: newInv
        }).eq('user_id', userId);
        
        tg.showAlert(`🎉 КОМБО! Вы выиграли ${rewardName} и ${prize} ⭐!`);
    }
    init();
}

init();
tg.ready();
</script>
</body>
</html>
