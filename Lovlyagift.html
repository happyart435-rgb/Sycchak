<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StarDrop - Catch Master</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #ffe600; /* Сочный желтый вместо зеленого */
            --danger: #ff4444;
            --bg-dark: #0f0e01; /* Темный фон с легким желтым отливом */
        }
        body { 
            margin: 0; 
            background: var(--bg-dark); 
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            overflow: hidden; 
            touch-action: none;
        }
        #game-screen { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            background: radial-gradient(circle at center, #242101 0%, #000 100%); /* Темно-золотой градиент */
        }
        
        .ui-panel { 
            position: absolute; 
            top: 40px; 
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            padding: 0 20px; 
            box-sizing: border-box; 
            z-index: 100; 
        }
        #score-cont { 
            font-size: 18px; 
            font-weight: 900; 
            color: var(--primary); 
            background: rgba(0,0,0,0.6); 
            padding: 8px 15px; 
            border-radius: 15px; 
            border: 1px solid rgba(255,230,0,0.3); /* Желтая рамка */
            box-shadow: 0 0 15px rgba(255,230,0,0.15); /* Желтый неон */
        }
        #pause-btn { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,230,0,0.2); /* Легкий желтый контур */
            color: white; 
            padding: 8px 15px; 
            border-radius: 12px; 
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: 0.2s;
        }
        #pause-btn:active {
            background: var(--primary);
            color: black;
        }

        #danger-zone {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 60px;
            background: linear-gradient(to top, rgba(255,68,68,0.3), transparent);
            border-top: 2px solid var(--danger);
            z-index: 10;
            box-shadow: 0 -10px 20px rgba(255,68,68,0.1);
        }

        .falling-item { 
            position: absolute; 
            cursor: pointer; 
            user-select: none; 
            z-index: 50; 
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.2));
            will-change: transform;
        }
        .falling-item img { width: 65px; height: 65px; object-fit: contain; pointer-events: none; }

        .modal { 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.92); 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            z-index: 1000; 
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .modal h2 { font-size: 32px; color: var(--primary); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        .m-btn { 
            width: 260px; 
            padding: 20px; 
            margin: 10px; 
            border-radius: 30px; 
            border: none; 
            font-weight: 900; 
            font-size: 16px; 
            cursor: pointer; 
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-green { background: var(--primary); color: black; box-shadow: 0 0 25px rgba(255,230,0,0.4); } /* Желтая неоновая кнопка */
        .btn-exit { background: #111; color: white; border: 1px solid #333; }
        
        .item-star { filter: drop-shadow(0 0 15px #ffd700); }
    </style>
</head>
<body>

<div id="game-screen">
    <div class="ui-panel">
        <button id="finish-btn" class="m-btn btn-exit" onclick="endGame('manual')">ЗАВЕРШИТЬ</button>
        <div id="score-cont">⭐ <span id="star-count">0</span></div>
    </div>
    
    <div id="danger-zone"></div>
</div>

<div id="pause-modal" class="modal">
    <h2>ПАУЗА</h2>
    <button class="m-btn btn-green" onclick="togglePause()">ПРОДОЛЖИТЬ</button>
    <button class="m-btn btn-exit" onclick="saveAndExit()">ВЫЙТИ И СОХРАНИТЬ</button>
</div>

<div id="fail-modal" class="modal">
    <img id="fail-icon" src="bomb.png" style="width: 100px; margin-bottom: 20px;">
    <h2 id="fail-title" style="color: var(--danger);">ИГРА ОКОНЧЕНА</h2>
    <p id="fail-msg">Вы пропустили подарок!</p>
    <div id="final-res" style="font-size: 24px; margin-bottom: 30px; font-weight: bold; color: #fff;">0 ⭐</div>
    <button id="exit-btn" class="m-btn btn-exit" onclick="saveAndExit()">ВЕРНУТЬСЯ В МЕНЮ</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    const SB = supabase.createClient("https://ypvvoqbvzfmirprevazq.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlwdnZvcWJ2emZtaXJwcmV2YXpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NzM3NTgsImV4cCI6MjA5NzQ0OTc1OH0.bt4iVMEX0JtYzJxW7gtRxWEOz0eXPIOautw7_FALhkc");

    const userId = tg.initDataUnsafe?.user?.id;
    const screen = document.getElementById('game-screen');
    const starLabel = document.getElementById('star-count');
    
    let starsEarned = 0;
    let gameActive = true;
    let gameStartTime = Date.now();
    
    // УВЕЛИЧИЛИ СКОРОСТЬ (было 2.0)
    let baseSpeed = 6.0; 
    let spawnRate = 800;
    let bombChance = 0.12;

    const ASSETS = ["1may.jpg", "1may.png", "chassiki.png", "sliva.png", "soska.png", "zirka.png", "2025.jpg", "bear.png", "book.jpg", "booox.png", "botinok.png", "box.png", "car.png", "raketa.png", "ccolso2.png", "cerrrdce.jpg", "chemodan.jpg", "ciga.png", "colso.png", "costum.jpg", "cvetok.png", "dog.png", "dyxi.png", "fonarik.jpg", "grob.jpg", "gyba.png", "happybirthday.jpg", "heart.png", "helmet.png", "kalendar.png", "kepka.png", "kirpitch.jpg", "koks.jpg", "koktel.png", "kot.png", "kotel.png", "krovatka.jpg", "lolipop.png", "lucky.jpg", "mafin.jpg", "metch.png", "narkotiki.png", "obyv.jpg", "orel.jpg", "otkritka.jpg", "paska.jpg", "rozza.png", "rykzak.jpg", "shapka.png", "shar.jpg", "shlem.png", "soska.jpg", "star.png", "statyya.jpg", "venok.png", "yayko.png", "zhele.png", "zmei.png", "meczcc.png", "kryg.PNG", "gribb.PNG", "zirka.PNG", "cvetk.PNG", "sshapka.PNG", "tyfli.PNG"];

    function getAssetUrl(fileName) { return window.location.origin + '/' + fileName; }

    async function initStars() {
        if (!userId) return;
        const { data } = await SB.from('users').select('stars').eq('user_id', userId).single();
        starLabel.innerText = Math.floor(data?.stars || 0);
    }

    async function saveAndExit() {
        if (userId && starsEarned > 0) {
            try {
                const { data } = await SB.from('users').select('stars').eq('user_id', userId).single();
                await SB.from('users').update({ stars: (data?.stars || 0) + starsEarned }).eq('user_id', userId);
            } catch (e) { console.error(e); }
        }
        window.location.href = 'index.html';
    }

    function spawnItem() {
        if (!gameActive) return;

        const item = document.createElement('div');
        item.className = 'falling-item';
        let isCaught = false; 
        
        let type = Math.random() < bombChance ? 'bomb' : 'gift';
        let imgName = type === 'bomb' ? 'bomb.png' : ASSETS[Math.floor(Math.random() * ASSETS.length)];

        item.innerHTML = `<img src="${getAssetUrl(imgName)}" onerror="this.src='star.png'">`;
        item.style.left = Math.random() * (window.innerWidth - 75) + 'px';
        item.style.top = '-100px';
        screen.appendChild(item);

        item.onmousedown = item.ontouchstart = (e) => {
            e.preventDefault();
            if (isCaught || !gameActive) return;
            isCaught = true;
            item.remove();
            
            if (type === 'bomb') {
                starsEarned = 0; 
                endGame('bomb');
            } else {
                starsEarned++;
                starLabel.innerText = parseInt(starLabel.innerText) + 1;
                tg.HapticFeedback.impactOccurred('light');
            }
        };

        let pos = -100;
        function fall() {
            if (!gameActive || isCaught) return;
            pos += baseSpeed; // Используем базовую скорость
            item.style.top = pos + 'px';

            if (pos > window.innerHeight - 60) {
                // Если подарок упал в danger-zone — игра окончена и заработок 0
                if (type === 'gift') {
                    starsEarned = 0; 
                    endGame('miss');
                }
                item.remove();
                return;
            }
            requestAnimationFrame(fall);
        }
        requestAnimationFrame(fall);
        setTimeout(spawnItem, spawnRate);
    }

function endGame(reason) {
    if (!gameActive) return;
    gameActive = false;
    
    const modal = document.getElementById('fail-modal');
    const title = document.getElementById('fail-title');
    const msg = document.getElementById('fail-msg');
    const resText = document.getElementById('final-res');
    const icon = document.getElementById('fail-icon');
    
    // Настраиваем модалку в зависимости от причины
    if (reason === 'bomb') {
        icon.src = "bomb.png";
        title.innerText = "БАБАХ!";
        msg.innerText = "Вы подорвались на мине!";
        resText.innerText = "ВЫ НИЧЕГО НЕ ЗАРАБОТАЛИ";
    } else if (reason === 'miss') {
        icon.src = "star.png"; // Можно сменить на иконку подарка
        title.innerText = "УВЫ...";
        msg.innerText = "Вы пропустили подарок!";
        resText.innerText = "ВЫ НИЧЕГО НЕ ЗАРАБОТАЛИ";
    } else {
        // Случай, когда нажали "ЗАВЕРШИТЬ"
        icon.src = "star.png"; 
        title.innerText = "ИГРА ЗАВЕРШЕНА";
        msg.innerText = "Хороший результат!";
        resText.innerText = `ВЫ ЗАРАБОТАЛИ: ${starsEarned} ⭐`;
    }
    
    modal.style.display = 'flex';
}

    initStars();
    spawnItem();
</script>
</body>
</html>
