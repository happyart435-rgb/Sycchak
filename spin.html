// Превращаем ключи в массив для случайного выбора
const itemFiles = Object.keys(ITEMS_OBJ);

async function spin() {
    const bet = parseInt(document.getElementById('bet-input').value);
    const btn = document.getElementById('spin-btn');
    btn.disabled = true;

    // Генерируем новые картинки
    document.querySelectorAll('.reel').forEach(reel => {
        let html = '';
        for(let j=0; j<10; j++) {
            let randomFile = itemFiles[Math.floor(Math.random() * itemFiles.length)];
            html += `<div class="cell"><img src="img/${randomFile}"></div>`;
        }
        reel.innerHTML = html;
        // Анимация
        reel.style.transition = 'transform 1.5s cubic-bezier(0.1, 0, 0, 1)';
        reel.style.transform = `translateY(-500px)`;
    });

    setTimeout(async () => {
        // Логика выигрыша
        let win = Math.random() > 0.7 ? bet * 2 : 0;
        document.getElementById('win-display').innerText = `Выигрыш: ${win} ⭐`;
        
        // Синхронизация БД
        let { data } = await SB.from('users').select('stars').eq('user_id', userId).single();
        let newStars = (data.stars || 0) - bet + win;
        await SB.from('users').update({ stars: newStars }).eq('user_id', userId);
        
        document.getElementById('bal').innerText = `Баланс: ${newStars} ⭐`;

        // Сброс
        document.querySelectorAll('.reel').forEach(r => {
            r.style.transition = 'none';
            r.style.transform = `translateY(0)`;
        });
        btn.disabled = false;
    }, 1500);
}
