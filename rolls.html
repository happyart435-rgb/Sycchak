<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Rolls — NowearSpin</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap');
:root{ --bg:#0d0a05; --accent:#d4af37; }
*{box-sizing:border-box;}
body{
  background:#0d0a05; color:#fff; font-family:'Inter',sans-serif;
  margin:0; padding:0; height:100vh; overflow:hidden;
  display:flex; flex-direction:column; user-select:none; -webkit-tap-highlight-color:transparent;
}
header{
  background:#0d0a05; border-bottom:2px solid rgba(212,175,55,0.3);
  padding:12px 20px; display:flex; align-items:center; gap:12px; height:65px; flex-shrink:0;
}
.logo{font-weight:900; font-size:1.3rem; text-transform:uppercase; font-style:italic;}
.back-btn{
  display:flex; align-items:center; justify-content:center; width:32px; height:32px; border-radius:50%;
  background:#111; border:1px solid rgba(212,175,55,0.3); flex-shrink:0;
}
.back-btn:active{transform:scale(0.9);}

.content{flex:1; overflow-y:auto; padding:16px 16px 110px 16px; -webkit-overflow-scrolling:touch;}
.content::-webkit-scrollbar{display:none;}

.tabs{display:flex; background:rgba(255,255,255,0.04); border:1px solid rgba(212,175,55,0.2); border-radius:14px; padding:4px; margin-bottom:16px;}
.tab{flex:1; text-align:center; padding:10px; font-weight:800; font-size:12px; text-transform:uppercase; border-radius:10px; color:#aaa; cursor:pointer;}
.tab.active{background:var(--accent); color:#0d0a05;}

.pot-label{text-align:center; color:#999; font-size:11px; text-transform:uppercase; letter-spacing:1px; font-weight:700;}
.pot-value{text-align:center; font-size:1.6rem; font-weight:900; color:var(--accent); margin-bottom:14px;}

.wheel-wrap{position:relative; width:260px; height:260px; margin:0 auto 18px auto;}
.pointer{
  position:absolute; top:-6px; left:50%; transform:translateX(-50%); width:0; height:0;
  border-left:14px solid transparent; border-right:14px solid transparent; border-top:22px solid #fff;
  z-index:5; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.6));
}
.wheel{
  width:100%; height:100%; border-radius:50%; position:relative;
  border:6px solid #1a1408; box-shadow:0 0 40px rgba(212,175,55,0.25), inset 0 0 20px rgba(0,0,0,0.5);
  transition: transform 4.5s cubic-bezier(0.17,0.67,0.18,1);
  background: conic-gradient(#1f1a10 0deg, #1f1a10 360deg);
}
.center-circle{
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:96px; height:96px; border-radius:50%; background:#0d0a05; border:3px solid var(--accent);
  display:flex; align-items:center; justify-content:center; text-align:center; flex-direction:column;
  z-index:4; box-shadow:0 0 20px rgba(212,175,55,0.4);
}
.center-circle .timer{font-size:1.4rem; font-weight:900; color:#fff;}
.center-circle .label{font-size:9px; color:var(--accent); text-transform:uppercase; font-weight:800; letter-spacing:0.5px;}

.bet-box{background:rgba(255,255,255,0.04); border:1px solid rgba(212,175,55,0.2); border-radius:18px; padding:14px; margin-bottom:18px;}
.amount-input{
  width:100%; background:rgba(255,255,255,0.06); border:1px solid rgba(212,175,55,0.3); border-radius:12px;
  padding:14px; text-align:center; font-size:1.1rem; font-weight:900; color:#fff; outline:none; margin-bottom:10px;
}
.amount-input:focus{border-color:var(--accent);}
.quick-row{display:flex; gap:6px; margin-bottom:10px;}
.quick-btn{flex:1; background:rgba(212,175,55,0.1); border:1px solid rgba(212,175,55,0.25); color:var(--accent); font-weight:800; font-size:12px; padding:8px 0; border-radius:10px;}
.quick-btn:active{transform:scale(0.95);}
.btn-bet{
  width:100%; background:var(--accent); color:#0d0a05; font-weight:900; padding:15px; border-radius:14px;
  text-transform:uppercase; font-size:1rem; border:none;
}
.btn-bet:active{transform:scale(0.97);}
.btn-bet:disabled{opacity:0.4;}

.players-title{font-size:12px; text-transform:uppercase; color:#999; font-weight:800; margin:10px 0 8px 2px;}
.player-row{
  display:flex; align-items:center; gap:10px; background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.06); border-radius:14px; padding:10px 12px; margin-bottom:8px;
}
.player-avatar{width:38px; height:38px; border-radius:50%; object-fit:cover; background:#222; border:2px solid var(--seg-color,#d4af37); flex-shrink:0;}
.player-info{flex:1; min-width:0;}
.player-name{font-size:13px; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.player-percent{font-size:11px; color:var(--accent); font-weight:700;}
.player-amount{font-size:14px; font-weight:900; flex-shrink:0;}
.empty-state{text-align:center; color:#666; font-size:12px; padding:30px 0;}

.winner-banner{
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:200;
  background:#161109; border:2px solid var(--accent); border-radius:20px; padding:24px 30px;
  text-align:center; box-shadow:0 0 40px rgba(212,175,55,0.5); display:none;
}
.winner-banner.show{display:block; animation:pop 0.3s ease;}
@keyframes pop{from{transform:translate(-50%,-50%) scale(0.7); opacity:0;} to{transform:translate(-50%,-50%) scale(1); opacity:1;}}
</style>
</head>
<body>

<header>
  <a href="games.html" class="back-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#d4af37" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline>
    </svg>
  </a>
  <div class="logo"><span class="text-[#d4af37]">ROLLS</span></div>
</header>

<div class="content">

  <div class="tabs">
    <div id="tab-stars" class="tab active" onclick="switchCurrency('stars')">⭐ Stars</div>
    <div id="tab-ton" class="tab" onclick="switchCurrency('ton')">💎 TON</div>
  </div>

  <div class="pot-label">Всего в банке</div>
  <div class="pot-value" id="pot-value">0</div>

  <div class="wheel-wrap">
    <div class="pointer"></div>
    <div class="wheel" id="wheel">
      <div class="center-circle">
        <div class="timer" id="timer-text">--</div>
        <div class="label" id="status-label">Ожидание</div>
      </div>
    </div>
  </div>

  <div class="bet-box">
    <input type="number" id="bet-amount" class="amount-input" placeholder="Сумма ставки">
    <div class="quick-row">
      <div class="quick-btn" onclick="addAmount(10)">+10</div>
      <div class="quick-btn" onclick="addAmount(50)">+50</div>
      <div class="quick-btn" onclick="addAmount(100)">+100</div>
      <div class="quick-btn" onclick="setMax()">MAX</div>
    </div>
    <button class="btn-bet" id="btn-bet" onclick="placeBet()">Сделать ставку</button>
  </div>

  <div class="players-title">Игроки в раунде</div>
  <div id="players-list">
    <div class="empty-state">Пока никто не сделал ставку</div>
  </div>

</div>

<div class="winner-banner" id="winner-banner">
  <div style="font-size:11px;color:#999;text-transform:uppercase;font-weight:800;">Победитель</div>
  <div id="winner-name" style="font-size:1.3rem;font-weight:900;color:#d4af37;margin:6px 0;"></div>
  <div id="winner-amount" style="font-size:1rem;font-weight:800;"></div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const SUPABASE_URL = 'https://ypvvoqbvzfmirprevazq.supabase.co';
const SUPABASE_KEY = 'sb_publishable_nG0LGd9T2s1aOM6eTRdoJQ_DPwkMvXz';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const userId = String(tg.initDataUnsafe?.user?.id || ('guest_' + Math.floor(Math.random()*100000)));
const username = tg.initDataUnsafe?.user?.username || tg.initDataUnsafe?.user?.first_name || 'Player';
const avatarUrl = tg.initDataUnsafe?.user?.photo_url || 'https://img.icons8.com/fluency/96/user-male-circle.png';

const SEG_COLORS = ['#d4af37','#37b6d4','#d43757','#37d479','#a637d4','#d49737','#3759d4','#d4377a'];

let currency = 'stars';
let currentRound = null;
let bets = [];
let countdownInt = null;
let pollInt = null;
let channel = null;
let settling = false;

function fmt(n){ return Math.round(n*100)/100; }

async function switchCurrency(c){
  if(c===currency) return;
  currency = c;
  document.getElementById('tab-stars').classList.toggle('active', c==='stars');
  document.getElementById('tab-ton').classList.toggle('active', c==='ton');
  document.getElementById('wheel').style.transform = 'rotate(0deg)';
  await loadOrCreateRound();
}

async function getMyBalance(){
  const { data } = await _supabase.from('users').select('*').eq('user_id', userId).single();
  if(!data) return 0;
  return currency==='stars' ? (data.stars||0) : (data.balance||0);
}

async function loadOrCreateRound(){
  document.getElementById('winner-banner').classList.remove('show');
  let { data } = await _supabase.from('roll_rounds')
    .select('*').eq('currency', currency).order('id', {ascending:false}).limit(1).maybeSingle();

  const now = Date.now();
  const needNew = !data || data.status === 'finished';

  if(needNew){
    const ends_at = new Date(Date.now() + 30000).toISOString();
    const { data: newRound } = await _supabase.from('roll_rounds')
      .insert({ currency, status:'waiting', ends_at }).select().single();
    currentRound = newRound;
  } else {
    currentRound = data;
  }

  await loadBets();
  renderAll();
  subscribeRealtime();
  startTickLoop();
}

async function loadBets(){
  const { data } = await _supabase.from('roll_bets')
    .select('*').eq('round_id', currentRound.id).order('id', {ascending:true});
  bets = data || [];
}

function getPlayerGroups(){
  // сохраняем порядок первого появления игрока — важно для одинаковых углов у всех клиентов
  const order = [];
  const map = {};
  bets.forEach(b=>{
    if(!map[b.user_id]){
      map[b.user_id] = { user_id:b.user_id, username:b.username, avatar_url:b.avatar_url, amount:0 };
      order.push(b.user_id);
    }
    map[b.user_id].amount += Number(b.amount);
  });
  return order.map(id=>map[id]);
}

function renderAll(){
  const players = getPlayerGroups();
  const total = players.reduce((s,p)=>s+p.amount,0);
  document.getElementById('pot-value').textContent = fmt(total) + (currency==='stars' ? ' ⭐' : ' 💎');

  // wheel gradient
  const wheelEl = document.getElementById('wheel');
  if(players.length===0){
    wheelEl.style.background = 'conic-gradient(#1f1a10 0deg, #1f1a10 360deg)';
  } else {
    let acc = 0;
    const stops = [];
    players.forEach((p,i)=>{
      const start = acc/total*360;
      acc += p.amount;
      const end = acc/total*360;
      const color = SEG_COLORS[i % SEG_COLORS.length];
      stops.push(`${color} ${start}deg ${end}deg`);
    });
    wheelEl.style.background = `conic-gradient(${stops.join(',')})`;
  }

  // players list
  const listEl = document.getElementById('players-list');
  if(players.length===0){
    listEl.innerHTML = '<div class="empty-state">Пока никто не сделал ставку</div>';
  } else {
    listEl.innerHTML = players.map((p,i)=>{
      const pct = total>0 ? fmt(p.amount/total*100) : 0;
      const color = SEG_COLORS[i % SEG_COLORS.length];
      return `<div class="player-row">
        <img class="player-avatar" style="--seg-color:${color}" src="${p.avatar_url||'https://img.icons8.com/fluency/96/user-male-circle.png'}" onerror="this.src='https://img.icons8.com/fluency/96/user-male-circle.png'">
        <div class="player-info">
          <div class="player-name">${escapeHtml(p.username||'Player')}</div>
          <div class="player-percent">${pct}%</div>
        </div>
        <div class="player-amount">${fmt(p.amount)} ${currency==='stars'?'⭐':'💎'}</div>
      </div>`;
    }).join('');
  }

  // status label
  if(currentRound.status === 'finished'){
    document.getElementById('status-label').textContent = 'Завершено';
  } else if(currentRound.status === 'spinning'){
    document.getElementById('status-label').textContent = 'Крутим...';
  } else {
    document.getElementById('status-label').textContent = 'Ожидание';
  }
}

function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function addAmount(v){
  const inp = document.getElementById('bet-amount');
  inp.value = (parseFloat(inp.value)||0) + v;
}
async function setMax(){
  const bal = await getMyBalance();
  document.getElementById('bet-amount').value = bal;
}

async function placeBet(){
  const inp = document.getElementById('bet-amount');
  const amount = parseFloat(inp.value);
  if(!amount || amount<=0){ tg.showAlert ? tg.showAlert('Введите сумму ставки') : alert('Введите сумму ставки'); return; }
  if(!currentRound || currentRound.status !== 'waiting'){ tg.showAlert ? tg.showAlert('Раунд уже стартовал, дождись нового') : alert('Раунд уже стартовал'); return; }

  const balance = await getMyBalance();
  if(amount > balance){ tg.showAlert ? tg.showAlert('Недостаточно средств') : alert('Недостаточно средств'); return; }

  document.getElementById('btn-bet').disabled = true;
  try{
    // списываем баланс
    const field = currency === 'stars' ? 'stars' : 'balance';
    const { error: balErr } = await _supabase.from('users')
      .update({ [field]: balance - amount }).eq('user_id', userId);
    if(balErr) throw balErr;

    // вставляем ставку
    const { error: betErr } = await _supabase.from('roll_bets').insert({
      round_id: currentRound.id, user_id: userId, username, avatar_url: avatarUrl, amount
    });
    if(betErr) throw betErr;

    inp.value = '';
    tg.HapticFeedback && tg.HapticFeedback.impactOccurred('medium');
    await loadBets();
    renderAll();
  } catch(e){
    console.error(e);
    tg.showAlert ? tg.showAlert('Ошибка: ' + e.message) : alert('Ошибка: ' + e.message);
  } finally {
    document.getElementById('btn-bet').disabled = false;
  }
}

function subscribeRealtime(){
  if(channel) _supabase.removeChannel(channel);
  channel = _supabase.channel('round-'+currentRound.id)
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'roll_bets', filter:`round_id=eq.${currentRound.id}` }, payload=>{
      bets.push(payload.new);
      renderAll();
    })
    .on('postgres_changes', { event:'UPDATE', schema:'public', table:'roll_rounds', filter:`id=eq.${currentRound.id}` }, payload=>{
      currentRound = payload.new;
      if(currentRound.status === 'spinning'){
        spinWheelTo(currentRound.result_point);
      }
      renderAll();
    })
    .subscribe();
}

function startTickLoop(){
  if(countdownInt) clearInterval(countdownInt);
  countdownInt = setInterval(tick, 1000);
  tick();
}

function tick(){
  if(!currentRound) return;
  const left = Math.ceil((new Date(currentRound.ends_at).getTime() - Date.now())/1000);
  const timerEl = document.getElementById('timer-text');

  if(currentRound.status === 'waiting'){
    if(left > 0){
      timerEl.textContent = left;
    } else {
      timerEl.textContent = '0';
      trySettle();
    }
  } else if(currentRound.status === 'spinning'){
    timerEl.textContent = '🎲';
  } else if(currentRound.status === 'finished'){
    timerEl.textContent = '✓';
  }
}

async function trySettle(){
  if(settling) return;
  settling = true;
  try{
    await loadBets();
    const players = getPlayerGroups();
    const total = players.reduce((s,p)=>s+p.amount,0);

    if(total === 0){
      // никто не ставил - просто пересоздаём раунд
      await _supabase.from('roll_rounds').update({ status:'finished' }).eq('id', currentRound.id).eq('status','waiting');
      setTimeout(()=>loadOrCreateRound(), 1500);
      return;
    }

    // выбираем победителя пропорционально ставке
    let r = Math.random() * total;
    let acc = 0;
    let winner = players[players.length-1];
    let winnerStartAngle = 0, winnerEndAngle = 360;
    let idx = 0;
    for(const p of players){
      const start = acc/total*360;
      acc += p.amount;
      const end = acc/total*360;
      if(r <= acc || idx === players.length-1){
        winner = p; winnerStartAngle = start; winnerEndAngle = end; break;
      }
      idx++;
    }
    const landingAngle = winnerStartAngle + Math.random()*(winnerEndAngle - winnerStartAngle);

    // атомарно "захватываем" раунд - только один клиент в гонке победит
    const { data: updated } = await _supabase.from('roll_rounds')
      .update({ status:'spinning', winner_user_id: winner.user_id, winner_username: winner.username, total_amount: total, result_point: landingAngle })
      .eq('id', currentRound.id).eq('status','waiting')
      .select();

    if(updated && updated.length > 0){
      // этот клиент выиграл гонку обновления -> он же выплачивает выигрыш
      currentRound = updated[0];
      spinWheelTo(landingAngle);
      setTimeout(async ()=>{
        const field = currency === 'stars' ? 'stars' : 'balance';
        const { data: winnerRow } = await _supabase.from('users').select('*').eq('user_id', winner.user_id).single();
        if(winnerRow){
          await _supabase.from('users').update({ [field]: (winnerRow[field]||0) + total }).eq('user_id', winner.user_id);
        }
        await _supabase.from('roll_rounds').update({ status:'finished' }).eq('id', currentRound.id);
        showWinnerBanner(winner, total);
        setTimeout(()=>loadOrCreateRound(), 3500);
      }, 4600);
    }
    // если updated пуст - значит другой клиент уже settle'ит, ждём realtime UPDATE событие
  } catch(e){
    console.error('settle error', e);
  } finally {
    settling = false;
  }
}

function spinWheelTo(angle){
  const wheelEl = document.getElementById('wheel');
  const spins = 5; // полных оборотов для эффекта
  const target = spins*360 + (360 - angle);
  wheelEl.style.transition = 'transform 4.5s cubic-bezier(0.17,0.67,0.18,1)';
  wheelEl.style.transform = `rotate(${target}deg)`;
}

function showWinnerBanner(winner, total){
  document.getElementById('winner-name').textContent = winner.username || 'Player';
  document.getElementById('winner-amount').textContent = '+ ' + fmt(total) + (currency==='stars'?' ⭐':' 💎');
  document.getElementById('winner-banner').classList.add('show');
  tg.HapticFeedback && tg.HapticFeedback.notificationOccurred('success');
}

loadOrCreateRound();
</script>
</body>
</html>
