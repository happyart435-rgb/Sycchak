<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NowearSpin Hub</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap');

        :root { --bg: #0d0a05; --accent: #d4af37; }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg); color: white; font-family: 'Inter', sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        header {
            background: #0d0a05; border-bottom: 2px solid rgba(212,175,55,0.3);
            padding: 12px 20px; display: flex; align-items: center; gap: 12px;
            height: 65px; flex-shrink: 0;
        }
        .logo { font-weight: 900; font-size: 1.4rem; text-transform: uppercase; font-style: italic; }
        .back-btn {
            display: flex; align-items: center; justify-content: center;
            width: 32px; height: 32px; border-radius: 50%;
            background: #111; border: 1px solid rgba(212,175,55,0.3);
            flex-shrink: 0; text-decoration: none;
        }
        .back-btn:active { transform: scale(0.9); }

        .games-list {
            flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
            padding: 16px 16px 30px;
        }
        .games-list::-webkit-scrollbar { display: none; }

        /* ===== КАРТОЧКА ===== */
        .game-card {
            position: relative; border-radius: 22px; overflow: hidden;
            margin-bottom: 16px; height: 140px;
            display: flex; align-items: center;
            cursor: pointer;
            transition: transform 0.18s ease;
        }
        .game-card:active { transform: scale(0.972); }

        @property --angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
        @keyframes spin-border { to { --angle: 360deg; } }

        .game-card::before {
            content: '';
            position: absolute; inset: -1.5px;
            border-radius: 23px;
            z-index: 0;
            background: conic-gradient(
                from var(--angle, 0deg),
                transparent 60%,
                var(--glow) 80%,
                transparent 100%
            );
            animation: spin-border 3s linear infinite;
        }

        .card-inner {
            position: absolute; inset: 1.5px;
            border-radius: 21px; overflow: hidden;
            z-index: 1; display: flex; align-items: center;
        }

        .card-bg { position: absolute; inset: 0; }
        .card-bg::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(
                100deg,
                rgba(10,8,3,0.97) 0%,
                rgba(10,8,3,0.88) 38%,
                rgba(10,8,3,0.35) 65%,
                rgba(10,8,3,0.0) 100%
            );
        }

        .card-shimmer {
            position: absolute; inset: 0; z-index: 5; pointer-events: none;
            background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.12) 50%, transparent 70%);
            opacity: 0; transition: opacity 0.1s;
        }
        .game-card:active .card-shimmer { opacity: 1; }

        /* картинка — позиционируем каждую индивидуально */
        .card-img {
            position: absolute;
            object-fit: contain;
            z-index: 2;
            pointer-events: none;
        }

        .card-stripe {
            position: absolute; left: 0; top: 16px; bottom: 16px;
            width: 3px; border-radius: 0 3px 3px 0; z-index: 6;
        }

        .card-body {
            position: relative; z-index: 6;
            padding: 0 16px; flex: 1;
        }
        .card-tag {
            display: inline-block;
            font-size: 9px; font-weight: 900; text-transform: uppercase;
            letter-spacing: 0.8px; padding: 2px 8px; border-radius: 20px;
            margin-bottom: 6px; border: 1px solid currentColor; opacity: 0.9;
        }
        .new-badge {
            background: linear-gradient(135deg, #9333ea, #ec4899);
            color: #fff; border: none !important; opacity: 1 !important;
        }
        .card-title {
            font-size: 1.25rem; font-weight: 900; line-height: 1.2;
            margin-bottom: 4px; text-shadow: 0 2px 8px rgba(0,0,0,0.9);
        }
        .card-desc { font-size: 11.5px; color: rgba(255,255,255,0.5); font-weight: 500; }

        .particles { position: absolute; inset: 0; z-index: 3; pointer-events: none; overflow: hidden; }
        .particle {
            position: absolute; border-radius: 50%;
            animation: float-particle var(--dur) ease-in-out infinite;
            opacity: 0;
        }
        @keyframes float-particle {
            0%   { transform: translate(0,0) scale(0.5); opacity: 0; }
            20%  { opacity: var(--op); }
            80%  { opacity: var(--op); }
            100% { transform: translate(var(--tx), var(--ty)) scale(1.2); opacity: 0; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="back-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#d4af37"
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
    </a>
    <div class="logo">
        <span style="color:#d4af37">NOWEAR</span><span>SPIN</span>
    </div>
</header>

<div class="games-list">

    <!-- ROLLS -->
    <div class="game-card" style="--glow:#9333ea" onclick="launch('rolls.html')">
        <div class="card-inner">
            <div class="card-bg" style="background:#120820;"></div>
            <div class="particles" id="p-rolls"></div>
            <!-- rolls: по центру справа -->
            <img class="card-img" src="img/mini%20games%20img/rolls.png"
                 onerror="this.style.display='none'"
                 style="right:-10px; top:50%; transform:translateY(-50%); height:130px; width:auto;">
            <div class="card-stripe" style="background:linear-gradient(180deg,#9333ea,#ec4899)"></div>
            <div class="card-body">
                <div class="card-tag new-badge">NEW</div>
                <div class="card-title">Rolls</div>
                <div class="card-desc">Ставь и крути колесо</div>
            </div>
            <div class="card-shimmer"></div>
        </div>
    </div>

    <!-- MINES -->
    <div class="game-card" style="--glow:#22c55e" onclick="launch('mines.html')">
        <div class="card-inner">
            <div class="card-bg" style="background:#071510;"></div>
            <div class="particles" id="p-mines"></div>
            <!-- mines: поднять вверх и левее -->
            <img class="card-img" src="img/mini%20games%20img/mines.png"
                 onerror="this.style.display='none'"
                 style="right:-20px; top:-5px; height:170px; width:auto;">
            <div class="card-stripe" style="background:linear-gradient(180deg,#22c55e,#15803d)"></div>
            <div class="card-body">
                <div class="card-tag" style="color:#22c55e">Классика</div>
                <div class="card-title">Mines</div>
                <div class="card-desc">Найди алмаз, обойди мины</div>
            </div>
            <div class="card-shimmer"></div>
        </div>
    </div>

    <!-- PLINKO -->
    <div class="game-card" style="--glow:#3b82f6" onclick="launch('plinko.html')">
        <div class="card-inner">
            <div class="card-bg" style="background:#060a18;"></div>
            <div class="particles" id="p-plinko"></div>
            <!-- plinko: левее -->
            <img class="card-img" src="img/mini%20games%20img/plinko.png"
                 onerror="this.style.display='none'"
                 style="right:-5px; top:50%; transform:translateY(-50%); height:165px; width:auto;">
            <div class="card-stripe" style="background:linear-gradient(180deg,#3b82f6,#1d4ed8)"></div>
            <div class="card-body">
                <div class="card-tag" style="color:#60a5fa">Популярно</div>
                <div class="card-title">Plinko</div>
                <div class="card-desc">Брось шарик, поймай множитель</div>
            </div>
            <div class="card-shimmer"></div>
        </div>
    </div>

    <!-- CATCHER -->
    <div class="game-card" style="--glow:#d4af37" onclick="launchWithPayment('Lovlyagift.html')">
        <div class="card-inner">
            <div class="card-bg" style="background:#120e00;"></div>
            <div class="particles" id="p-catcher"></div>
            <!-- catcher: по центру справа -->
            <img class="card-img" src="img/mini%20games%20img/catcher.png"
                 onerror="this.style.display='none'"
                 style="right:-5px; top:50%; transform:translateY(-50%); height:145px; width:auto;">
            <div class="card-stripe" style="background:linear-gradient(180deg,#d4af37,#b8860b)"></div>
            <div class="card-body">
                <div class="card-tag" style="color:#d4af37">100 ⭐ вход</div>
                <div class="card-title">Catcher</div>
                <div class="card-desc">Лови подарки и TON</div>
            </div>
            <div class="card-shimmer"></div>
        </div>
    </div>

</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    const SB = supabase.createClient(
        "https://ypvvoqbvzfmirprevazq.supabase.co",
        "sb_publishable_nG0LGd9T2s1aOM6eTRdoJQ_DPwkMvXz"
    );
    const userId = tg.initDataUnsafe?.user?.id;

    function launch(url) { window.location.href = url; }

    async function launchWithPayment(file) {
        if (!userId) { alert("Ошибка авторизации"); return; }
        try {
            const { data } = await SB.from('users').select('stars').eq('user_id', userId).single();
            if ((data?.stars || 0) < 100) { alert("Недостаточно звезд! Нужно 100."); return; }
            if (confirm("Вход в игру стоит 100 звезд. Продолжить?")) {
                await SB.from('users').update({ stars: data.stars - 100 }).eq('user_id', userId);
                window.location.replace("./" + file);
            }
        } catch(e) { console.error(e); alert("Ошибка сервера"); }
    }

    function spawnParticles(containerId, color) {
        const el = document.getElementById(containerId);
        if (!el) return;
        const W = el.offsetWidth || 340;
        const H = el.offsetHeight || 140;
        for (let i = 0; i < 10; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 4 + 2;
            p.style.cssText = `
                width:${size}px; height:${size}px; background:${color};
                left:${Math.random()*W}px; top:${Math.random()*H}px;
                --dur:${(Math.random()*2+2).toFixed(1)}s;
                --tx:${((Math.random()-0.5)*60).toFixed(0)}px;
                --ty:${-(Math.random()*50+20).toFixed(0)}px;
                --op:${(Math.random()*0.45+0.2).toFixed(2)};
                animation-delay:${(Math.random()*2.5).toFixed(1)}s;
                box-shadow:0 0 ${size*2}px ${color};
            `;
            el.appendChild(p);
        }
    }

    spawnParticles('p-rolls',   '#c084fc');
    spawnParticles('p-mines',   '#4ade80');
    spawnParticles('p-plinko',  '#60a5fa');
    spawnParticles('p-catcher', '#fcd34d');
</script>
</body>
</html>
