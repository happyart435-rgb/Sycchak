<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #coin { width: 200px; cursor: pointer; transition: 0.1s; user-select: none; }
        #coin:active { transform: scale(0.9); }
        .stats { font-size: 24px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="stats">Монет: <span id="balance">0</span></div>
    <img id="coin" src="https://cdn-icons-png.flaticon.com/512/1205/1205194.png" alt="coin">
    <div id="energy">Энергия: 1000/1000</div>

<script>
    // 1. НАСТРОЙКИ
    const SUPABASE_URL = 'https://ypvvoqbvzfmirprevazq.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlwdnZvcWJ2emZtaXJwcmV2YXpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NzM3NTgsImV4cCI6MjA5NzQ0OTc1OH0.bt4iVMEX0JtYzJxW7gtRxWEOz0eXPIOautw7_FALhkc';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const tg = window.Telegram.WebApp;
    const userId = tg.initDataUnsafe?.user?.id || 12345; // Для теста в браузере

    let state = { points: 0, energy: 1000 };

    // 2. ЗАГРУЗКА ИЗ БД
    async function loadData() {
        const { data } = await supabase.from('players').select('*').eq('user_id', userId).single();
        if (data) {
            state = data;
        } else {
            // Если юзера нет, создаем
            await supabase.from('players').insert([{ user_id: userId, points: 0, energy: 1000 }]);
        }
        updateUI();
    }

    // 3. ОБНОВЛЕНИЕ ЭКРАНА
    function updateUI() {
        document.getElementById('balance').innerText = Math.floor(state.points);
        document.getElementById('energy').innerText = `Энергия: ${state.energy}/1000`;
    }

    // 4. КЛИК
    document.getElementById('coin').onclick = async () => {
        if (state.energy > 0) {
            state.points += 1;
            state.energy -= 1;
            updateUI();
            
            // Сохраняем в базу (с задержкой, чтобы не вешать сервер)
            clearTimeout(window.saveTimer);
            window.saveTimer = setTimeout(saveToDB, 1000);
        }
    };

    // 5. СОХРАНЕНИЕ В БД
    async function saveToDB() {
        await supabase.from('players').upsert({
            user_id: userId,
            points: state.points,
            energy: state.energy
        });
    }

    // 6. ВОССТАНОВЛЕНИЕ ЭНЕРГИИ
    setInterval(() => {
        if (state.energy < 1000) {
            state.energy += 1;
            updateUI();
        }
    }, 1000);

    loadData();
</script>
</body>
</html>
