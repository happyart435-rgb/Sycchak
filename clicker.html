<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hamster Clicker</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#111827;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:400px;
    text-align:center;
}

h1{
    margin-bottom:20px;
}

.balance{
    font-size:32px;
    font-weight:bold;
    margin-bottom:20px;
    color:#ffd700;
}

.hamster{
    width:220px;
    height:220px;
    border-radius:50%;
    background:#f59e0b;
    margin:auto;
    cursor:pointer;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:90px;
    user-select:none;
    transition:.1s;
    box-shadow:0 0 30px rgba(255,215,0,.4);
}

.hamster:active{
    transform:scale(.95);
}

.stats{
    margin-top:20px;
    font-size:20px;
}

.upgrades{
    margin-top:25px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}
</style>
</head>
<body>

<div class="container">

    <h1>🐹 Hamster Clicker</h1>

    <div class="balance">
        💰 <span id="coins">0</span>
    </div>

    <div class="hamster" id="hamster">
        🐹
    </div>

    <div class="stats">
        За клик: <span id="perClick">1</span>
    </div>

    <div class="upgrades">
        <button onclick="buyPower()">
            ⚡ Улучшить клик
            (<span id="powerCost">50</span>)
        </button>

        <button onclick="buyAuto()">
            🤖 Автодоход
            (<span id="autoCost">100</span>)
        </button>

        <div style="margin-top:15px;">
            Автодоход: <span id="autoIncome">0</span>/сек
        </div>
    </div>

</div>

<script>

let coins = Number(localStorage.getItem("coins")) || 0;
let perClick = Number(localStorage.getItem("perClick")) || 1;
let powerCost = Number(localStorage.getItem("powerCost")) || 50;

let autoIncome = Number(localStorage.getItem("autoIncome")) || 0;
let autoCost = Number(localStorage.getItem("autoCost")) || 100;

function save(){
    localStorage.setItem("coins", coins);
    localStorage.setItem("perClick", perClick);
    localStorage.setItem("powerCost", powerCost);
    localStorage.setItem("autoIncome", autoIncome);
    localStorage.setItem("autoCost", autoCost);
}

function updateUI(){
    document.getElementById("coins").innerText =
        Math.floor(coins);

    document.getElementById("perClick").innerText =
        perClick;

    document.getElementById("powerCost").innerText =
        powerCost;

    document.getElementById("autoIncome").innerText =
        autoIncome;

    document.getElementById("autoCost").innerText =
        autoCost;
}

document.getElementById("hamster").addEventListener("click", ()=>{

    coins += perClick;

    updateUI();
    save();

});

function buyPower(){

    if(coins < powerCost){
        alert("Недостаточно монет!");
        return;
    }

    coins -= powerCost;
    perClick += 1;

    powerCost = Math.floor(powerCost * 1.7);

    updateUI();
    save();
}

function buyAuto(){

    if(coins < autoCost){
        alert("Недостаточно монет!");
        return;
    }

    coins -= autoCost;
    autoIncome += 1;

    autoCost = Math.floor(autoCost * 1.8);

    updateUI();
    save();
}

setInterval(()=>{

    coins += autoIncome;

    updateUI();
    save();

},1000);

updateUI();

</script>

</body>
</html>
