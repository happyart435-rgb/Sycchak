<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>StarDrop Gold Upgrade</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --accent: #f59e0b;
            --accent-hover: #d97706;
            --bg: #0f0f0f;
            --card-bg: rgba(255, 255, 255, 0.03);
        }

        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            height: 100vh; 
            overflow: hidden; 
            margin: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Круговая рулетка */
        .wheel-container { 
            width: 190px; height: 190px; 
            border-radius: 50%; 
            background: #050505; 
            border: 2px solid rgba(245, 158, 11, 0.2); 
            margin: 10px auto; 
            position: relative; 
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(245, 158, 11, 0.1);
        }
        
        #wheel-progress { 
            position: absolute; inset: 0; 
            border-radius: 50%; 
            background: conic-gradient(var(--accent) 0deg, transparent 0deg); 
            opacity: 0.25;
            transition: background 0.5s ease;
        }

        #pointer-wrapper { position: absolute; inset: -10px; z-index: 30; transition: transform 3.5s cubic-bezier(0.15, 0, 0.15, 1); }
        #pointer { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 3px; height: 25px; background: #fff; border-radius: 10px; box-shadow: 0 0 15px var(--accent); }

        /* Списки предметов */
        .scroll-area { 
            height: 220px; overflow-y: auto; 
            background: var(--card-bg); 
            border-radius: 16px; padding: 10px; 
            border: 1px solid rgba(255,255,255,0.05); 
        }
        
        .item-card { 
            display: flex; align-items: center; gap: 10px; 
            padding: 10px; margin-bottom: 8px; 
            border-radius: 12px; background: rgba(255,255,255,0.02); 
            border: 1px solid transparent; transition: 0.2s;
        }
        .item-card.active { border-color: var(--accent); background: rgba(245, 158, 11, 0.08); }

        /* Слоты */
        .slot { 
            width: 100%; height: 75px; 
            background: var(--card-bg); 
            border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 18px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.3s;
        }
        .slot.filled { border-color: rgba(245, 158, 11, 0.3); background: rgba(245, 158, 11, 0.03); }

        .btn-main { 
            background: var(--accent); color: #000; 
            font-weight: 900; width: 100%; 
            padding: 18px; border-radius: 16px; 
            box-shadow: 0 4px 20px rgba(245, 158, 11, 0.15); 
            transition: 0.3s; 
        }
        .btn-main:disabled { background: #222; color: #555; box-shadow: none; opacity: 0.5; }
        .btn-main:active { transform: scale(0.98); }

        #res-msg { position: absolute; font-size: 26px; font-weight: 900; z-index: 40; display: none; text-align: center; width: 100%; letter-spacing: 2px; }
        
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body class="p-5">

        "sshapka.PNG": { name: "Khabib's Papakha", price: 2300, img: "sshapka.PNG" },

        "star.png": { name: "Star", price: 5, img: "star.png } // <- Здесь пропущена закрывающая кавычка "
    };

    let userInventory = [];
    let s1 = null; let s2 = null;

    async function loadFromDB() {
        try {
            const { data, error } = await _supabase.from('users').select('inventory').eq('user_id', userId).single();
            if (!error && data?.inventory) {
                userInventory = Array.isArray(data.inventory) ? data.inventory : [];
            }
            document.getElementById('info-chance').innerText = userInventory.length > 0 ? "ВЫБЕРИ СВОЙ ПРЕДМЕТ" : "РЮКЗАК ПУСТ";
            render();
        } catch (err) {
            console.error("Ошибка загрузки:", err);
        }
    }

    function render() {
        const mList = document.getElementById('mine-list');
        const tList = document.getElementById('target-list');

        mList.innerHTML = userInventory.map((it, i) => {
            const imgPath = typeof it === 'string' ? it : (it.img || '');
            const file = imgPath.split('/').pop();
            const info = ITEMS[file] || { name: file || "Item", price: 0 };
            const src = imgPath.startsWith('img/') ? imgPath : 'img/' + imgPath;
            return `
                <div class="item-card ${s1?.idx === i ? 'active' : ''}" onclick="sel1(${i},'${src}','${info.name}', ${info.price}, '${file}')">
                    <img src="${src}" class="w-8 h-8 object-contain" onerror="this.src='img/star.png'">
                    <div class="overflow-hidden">
                        <div class="text-[9px] font-black truncate uppercase">${info.name}</div>
                        <div class="text-[7px] opacity-40">${info.price} ⭐</div>
                    </div>
                </div>`;
        }).join('');

        tList.innerHTML = Object.entries(ITEMS)
            .filter(([file, info]) => !s1 || info.price > s1.price)
            .sort((a,b) => a[1].price - b[1].price)
            .map(([file, info]) => `
                <div class="item-card ${s2?.file === file ? 'active' : ''}" onclick="sel2('img/${file}','${info.name}', ${info.price}, '${file}')">
                    <img src="img/${file}" class="w-8 h-8 object-contain" onerror="this.src='img/star.png'">
                    <div class="overflow-hidden">
                        <div class="text-[9px] font-black truncate uppercase">${info.name}</div>
                        <div class="text-[7px] text-[#f59e0b] font-bold">${info.price} ⭐</div>
                    </div>
                </div>`).join('');
    }

    function sel1(idx, img, name, price, file) {
        s1 = {idx, img, name, price, file};
        const el = document.getElementById('img-1');
        el.src = img; el.classList.remove('hidden');
        document.getElementById('slot-1').classList.add('filled');
        s2 = null; 
        document.getElementById('img-2').classList.add('hidden');
        document.getElementById('view-target').classList.add('hidden');
        document.getElementById('view-empty').classList.remove('hidden');
        updateUI(); render();
        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
    }

    function sel2(img, name, price, file) {
        s2 = {img, name, price, file};
        const el2 = document.getElementById('img-2');
        el2.src = img; el2.classList.remove('hidden');
        document.getElementById('slot-2').classList.add('filled');
        
        const vt = document.getElementById('view-target');
        vt.src = img; vt.classList.remove('hidden');
        document.getElementById('view-empty').classList.add('hidden');
        updateUI(); render();
        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
    }

    function updateUI() {
        const btn = document.getElementById('upg-btn');
        const info = document.getElementById('info-chance');
        const wheel = document.getElementById('wheel-progress');
        
        if(s1 && s2) {
            let visualChance = (s1.price / s2.price) * 100 * 0.8;
            visualChance = Math.min(Math.max(visualChance, 10), 85);
            
            info.innerText = `ШАНС НА УСПЕХ: ${visualChance.toFixed(1)}%`;
            wheel.style.background = `conic-gradient(#f59e0b ${visualChance * 3.6}deg, transparent 0deg)`;
            btn.disabled = false;
        } else {
            btn.disabled = true;
            wheel.style.background = `conic-gradient(#f59e0b 0deg, transparent 0deg)`;
            info.innerText = s1 ? "ВЫБЕРИ ЦЕЛЬ УЛУЧШЕНИЯ" : "ВЫБЕРИ СВОЙ ПРЕДМЕТ";
        }
    }

    async function startUpgrade() {
        if(!s1 || !s2) return;
        const btn = document.getElementById('upg-btn');
        const pointer = document.getElementById('pointer-wrapper');
        const resMsg = document.getElementById('res-msg');
        btn.disabled = true;

        let visualChance = (s1.price / s2.price) * 100 * 0.8;
        visualChance = Math.min(Math.max(visualChance, 10), 85);
        const winDeg = visualChance * 3.6; 

        const luckRoll = Math.random() * 100;
        const isWin = luckRoll <= 80; // 80% подкрутка

        const spins = 360 * 5;
        let finalDeg = isWin 
            ? (spins + Math.random() * (winDeg - 2)) 
            : (spins + winDeg + Math.random() * (358 - winDeg)); 

        pointer.style.transform = `rotate(${finalDeg}deg)`;
        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');

        setTimeout(async () => {
            document.getElementById('center-ui').style.opacity = "0";
            resMsg.style.display = "block";

            // Очищаем массив до чистых строк (имён файлов), чтобы база не ругалась на объекты
            let newInv = userInventory.map(it => typeof it === 'string' ? it : (it.img || it));
            
            if (isWin) {
                resMsg.innerText = "УСПЕХ"; 
                resMsg.style.color = "#f59e0b";
                if(s1.idx >= 0 && s1.idx < newInv.length) {
                    newInv[s1.idx] = s2.file;
                }
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            } else {
                resMsg.innerText = "СЛОМАЛСЯ"; 
                resMsg.style.color = "#ef4444";
                if(s1.idx >= 0 && s1.idx < newInv.length) {
                    newInv.splice(s1.idx, 1);
                }
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
            }

            // Запись в БД с ожиданием ответа до перезагрузки страницы
            try {
                const { error } = await _supabase
                    .from('users')
                    .update({ inventory: newInv })
                    .eq('user_id', userId);

                if (error) throw error;
                console.log("Успешно сохранено в БД");
            } catch(e) {
                console.error("Ошибка сохранения в базу:", e);
                resMsg.innerText = "ОШИБКА БД";
                resMsg.style.color = "#ef4444";
            }
            
            // Перезагрузка происходит строго ПОСЛЕ ответа от Supabase
            setTimeout(() => location.reload(), 2500);
        }, 3600);
    }

    window.onload = () => { if(tg.expand) tg.expand(); loadFromDB(); };
</script>
