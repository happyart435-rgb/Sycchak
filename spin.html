<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Nowear Slots Pro</title>
    <style>
        body { background: #1a1a1a; color: #ffd700; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        .header { background: #000; padding: 10px; border: 2px solid #d4af37; border-radius: 10px; margin: 10px; width: 350px; text-align: center; }
        .slot-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; border: 4px solid #d4af37; width: 350px; height: 300px; overflow: hidden; background: #222; }
        .reel { display: flex; flex-direction: column; transition: transform 1.5s cubic-bezier(0.1, 0, 0, 1); }
        .cell { height: 75px; display: flex; align-items: center; justify-content: center; }
        .cell img { width: 50px; height: 50px; }
    </style>
</head>
<body>

<div class="header">
    <div id="bal">Баланс: -- ⭐</div>
    <div id="win-display">Выигрыш: 0 ⭐</div>
</div>

<div class="slot-container" id="grid">
    <div class="reel" id="r0"></div><div class="reel" id="r1"></div><div class="reel" id="r2"></div><div class="reel" id="r3"></div><div class="reel" id="r4"></div>
</div>

<div class="controls" style="display: flex; flex-direction: column; gap: 10px; margin-top: 15px;">
    <input type="number" id="bet-input" value="25">
    <button onclick="spin(false)">КРУТИТЬ</button>
    <button onclick="spin(true)" style="background: #ff4500; color: white;">БОНУСКА (x10)</button>
</div>

<script>
// Добавляем множители каждому символу
const ITEMS = {
    "star.png": { name: "Pure Star", chance: 100, x: 1 },
    "paska.jpg": { name: "Easter Cake", chance: 90, x: 1.2 },
    "otkritka.jpg": { name: "Peace Dove", chance: 85, x: 1.5 },
    "koks.jpg": { name: "Party Cocktail", chance: 80, x: 1.8 },
    "botinok.png": { name: "Old Boot", chance: 70, x: 2 },
    "kalendar.png": { name: "Event Calendar", chance: 70, x: 2.2 },
    "1may.jpg": { name: "1 May Exclusive", chance: 60, x: 2.5 },
    "bear.png": { name: "Honey Bear", chance: 50, x: 3 },
    "koktel.png": { name: "Toxic Mix", chance: 50, x: 3 },
    "dog.png": { name: "Rich Dog", chance: 50, x: 3 },
    "shapka.png": { name: "Santa Hat", chance: 50, x: 3 },
    "zmei.png": { name: "Snake Friend", chance: 50, x: 3 },
    "lucky.jpg": { name: "Clover Lucky", chance: 50, x: 3 },
    "box.png": { name: "Jack in Box", chance: 45, x: 4 },
    "krovatka.jpg": { name: "Baby Bow", chance: 45, x: 4 },
    "yayko.png": { name: "Dragon Egg", chance: 45, x: 4 },
    "meczcc.png": { name: "Faith Amulet", chance: 45, x: 4 },
    "kryg.PNG": { name: "Snow Globe", chance: 45, x: 4 },
    "gribb.PNG": { name: "Spy Agaric", chance: 45, x: 4 },
    "booox.png": { name: "Berry Box", chance: 40, x: 5 },
    "mafin.jpg": { name: "Sugar Muffin", chance: 40, x: 5 },
    "metch.png": { name: "Star Saber", chance: 40, x: 5 },
    "zhele.png": { name: "Slime Jelly", chance: 40, x: 5 },
    "zirka.PNG": { name: "Hanging Star", chance: 35, x: 6 },
    "cvetk.PNG": { name: "Sakura Flower", chance: 30, x: 7 },
    "book.jpg": { name: "Ancient Book", chance: 25, x: 8 },
    "cvetok.png": { name: "Wild Flower", chance: 25, x: 8 },
    "shar.jpg": { name: "Magic Ball", chance: 25, x: 8 },
    "tyfli.PNG": { name: "Sky Stilettos", chance: 20, x: 10 },
    "rozza.png": { name: "Velvet Rose", chance: 15, x: 15 },
    "heart.png": { name: "Heart Lock", chance: 15, x: 15 },
    "sshapka.PNG": { name: "Khabib's Papakha", chance: 12, x: 20 },
    "colso.png": { name: "Blue Diamond", chance: 10, x: 25 },
    "soska.jpg": { name: "Diamond Pacifier", chance: 8, x: 30 },
    "ciga.png": { name: "Luxury Cigar", chance: 8, x: 30 },
    "ccolso2.png": { name: "Star Ring", chance: 8, x: 30 },
    "shlem.png": { name: "Biker Helmet", chance: 6, x: 40 },
    "orel.jpg": { name: "Golden Eagle", chance: 4, x: 50 },
    "car.png": { name: "Sports Car", chance: 4, x: 50 },
    "chemodan.jpg": { name: "Traveler Case", chance: 4, x: 50 },
    "grob.jpg": { name: "Ancient Coffin", chance: 4, x: 50 },
    "gyba.png": { name: "Lava Lips", chance: 4, x: 50 },
    "kirpitch.jpg": { name: "Golden Brick", chance: 2, x: 100 },
    "dyxi.png": { name: "Gold Perfume", chance: 2, x: 100 },
    "kot.png": { name: "Atomic Cat", chance: 2, x: 100 },
    "obyv.jpg": { name: "Sneakers Pro", chance: 2, x: 100 },
    "statyya.jpg": { name: "Hero Statue", chance: 1, x: 200 },
    "kepka.png": { name: "Legendary Cap", chance: 0.5, x: 500 },
    "costum.jpg": { name: "Royal Costume", chance: 0.5, x: 500 },
    "helmet.png": { name: "Spartan Helmet", chance: 0.5, x: 500 }
};
const itemFiles = Object.keys(ITEMS);

function getResult() {
    // Генерируем 5 случайных символов, которые выпадут на линии
    return Array.from({length: 5}, () => itemFiles[Math.floor(Math.random() * itemFiles.length)]);
}

async function spin(isBonus) {
    const baseBet = parseInt(document.getElementById('bet-input').value);
    const totalBet = isBonus ? baseBet * 10 : baseBet;
    
    // 1. Предварительно определяем результат
    const result = getResult(); 
    
    // 2. Заполняем барабаны (последний элемент - наш результат)
    document.querySelectorAll('.reel').forEach((reel, i) => {
        let html = '';
        for(let j=0; j<8; j++) {
            html += `<div class="cell"><img src="img/${itemFiles[Math.floor(Math.random() * itemFiles.length)]}"></div>`;
        }
        // В конец добавляем наш "выигрышный" символ
        html += `<div class="cell"><img src="img/${result[i]}"></div>`;
        reel.innerHTML = html;
        reel.style.transform = `translateY(-450px)`;
    });

    setTimeout(() => {
        // 3. Считаем выигрыш (например, если все символы одинаковые)
        const allSame = result.every(val => val === result[0]);
        let win = allSame ? totalBet * ITEMS[result[0]].x : 0;
        
        document.getElementById('win-display').innerText = `Выигрыш: ${win} ⭐`;
        
        // Тут нужно добавить запрос к Supabase для обновления баланса
        
        document.querySelectorAll('.reel').forEach(r => {
            r.style.transition = 'none';
            r.style.transform = `translateY(0)`;
        });
    }, 1600);
}
</script>
</body>
</html>
